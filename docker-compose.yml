services:
  db:
    image: postgis/postgis:16-3.4
    container_name: hugatree_db
    environment:
      POSTGRES_DB: hugatree
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hugatree"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    container_name: hugatree_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hugatree
      DB_USER: postgres
      DB_PASS: postgres

      JWT_SECRET: change_me_to_a_long_random_string
      JWT_ISSUER: hugatree
      ACCESS_TTL_MINUTES: 1
      REFRESH_TTL_DAYS: 30
      UPLOADS_PATH: /var/uploads
    volumes:
      - uploads_data:/var/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      php
      -d display_errors=1
      -d display_startup_errors=1
      -d error_reporting=E_ALL
      -d log_errors=1
      -S 0.0.0.0:8000
      -t public

volumes:
  db_data:
  uploads_data: